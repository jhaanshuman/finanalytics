<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 500px;
      height: 400px;
      background: linear-gradient(135deg, #0a0a0f 0%, #111118 50%, #0a0a0f 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      border-radius: 16px;
      -webkit-app-region: drag;
    }
    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #00d4ff, #7c3aed);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      box-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
      animation: pulse 2s ease-in-out infinite;
    }
    .logo span {
      font-size: 40px;
      font-weight: 800;
      color: white;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #00d4ff, #7c3aed, #f43f5e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .subtitle {
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      margin-bottom: 32px;
    }
    .progress-container {
      width: 280px;
      height: 3px;
      background: rgba(255,255,255,0.05);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #00d4ff, #7c3aed);
      border-radius: 3px;
      animation: progress 2s ease-in-out infinite;
    }
    .status {
      color: rgba(255,255,255,0.3);
      font-size: 12px;
      font-family: 'SF Mono', monospace;
    }
    .creator {
      position: absolute;
      bottom: 20px;
      text-align: center;
      color: rgba(255,255,255,0.2);
      font-size: 11px;
      line-height: 1.6;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.3); }
      50% { box-shadow: 0 0 60px rgba(0, 212, 255, 0.6); }
    }
    @keyframes progress {
      0% { width: 0%; transform: translateX(-100%); }
      50% { width: 100%; transform: translateX(0%); }
      100% { width: 100%; transform: translateX(100%); }
    }
    .particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(0, 212, 255, 0.3);
      border-radius: 50%;
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
      50% { transform: translateY(-30px) scale(1.5); opacity: 0.8; }
    }
  </style>
</head>
<body>
  <div class="particles">
    <div class="particle" style="left:10%;top:20%;animation-delay:0s"></div>
    <div class="particle" style="left:30%;top:60%;animation-delay:1s"></div>
    <div class="particle" style="left:50%;top:30%;animation-delay:2s"></div>
    <div class="particle" style="left:70%;top:70%;animation-delay:3s"></div>
    <div class="particle" style="left:90%;top:40%;animation-delay:4s"></div>
  </div>

  <div class="logo">
    <span>F</span>
  </div>
  <h1>FinAnalytics</h1>
  <p class="subtitle">Initializing Financial Intelligence Engine...</p>

  <div class="progress-container">
    <div class="progress-bar"></div>
  </div>
  <p class="status">Loading modules...</p>

  <div class="creator">
    Designed, Created and Developed by<br>
    Anshuman Jha<br>
    <span style="font-size:10px">Brainchild of Anshuman Kr Jha</span>
  </div>
</body>
</html>
